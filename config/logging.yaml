version: 1

disable_existing_loggers: false

formatters:

  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"

handlers:

  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/application.log
    maxBytes: 5242880
    backupCount: 5
    encoding: utf-8

root:
  level: DEBUG
  handlers:
    - console
    - file